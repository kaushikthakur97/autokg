name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-and-e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[oxigraph,mcp]' pyarrow
      - name: Starter smoke test
        run: |
          autokg --help
          autokg init customer360 -o /tmp/customer360
          cd /tmp/customer360
          python make_demo_data.py
          autokg build -c autokg.yml
          autokg studio -c autokg.yml -o studio.html
      - name: E2E scripts
        run: |
          python tests/test_e2e_realworld.py
          python tests/test_insurance_e2e.py
