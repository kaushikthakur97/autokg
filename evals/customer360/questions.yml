name: customer360-smoke
cases:
  - question: show customers
    min_rows: 1
    sparql_contains:
      - ex:Customer
    evidence_entities:
      - Customer
  - question: show orders
    min_rows: 1
    sparql_contains:
      - ex:Order
    evidence_entities:
      - Order
  - question: list triples
    min_rows: 1
    sparql_contains:
      - ?s ?p ?o
