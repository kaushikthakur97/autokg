name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  v1-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[oxigraph,mcp]' pyarrow
      - name: v1 core smoke test
        run: |
          autokg --help
          autokg init customer360 -o /tmp/customer360
          cd /tmp/customer360
          python make_demo_data.py
          autokg validate -c autokg.yml
          autokg build -c autokg.yml
          autokg inspect gold
          autokg report gold
          autokg generate-sparql gold "show customers"
          autokg ask gold "show customers"
          autokg schema export -o autokg.schema.json
          autokg ontology -c autokg.yml
          autokg eval gold $GITHUB_WORKSPACE/evals/customer360/questions.yml
          autokg benchmark --rows 100 --output benchmark_report.json
          test -f gold/graph.ttl
          test -f gold/graph.jsonld
          test -f gold/graph.nt
          test -f gold/graph.rdf
          test -f gold/ontology.ttl
          test -f gold/manifest.json
          test -f gold/lineage.json
          test -f gold/audit.jsonl
          test -f gold/validation_report.json
          test -f gold/build_report.html
      - name: Existing E2E scripts
        run: |
          python tests/test_e2e_realworld.py
          python scripts/generate_insurance_data.py
          python tests/test_insurance_e2e.py
